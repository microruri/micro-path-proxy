name: Build and Release micro-path-proxy

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Platform Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.20'
        
    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go mod tidy || true
        go build -v -ldflags="-s -w" -o micro-path-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: micro-path-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
        path: micro-path-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/**/*
