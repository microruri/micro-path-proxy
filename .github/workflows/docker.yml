name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 QEMU 用于交叉编译，让我们可以同时打包 amd64 和 arm64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 初始化 Docker Buildx，这是高级多平台编译的核心引擎
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 DockerHub，这里使用了你提到的两个系统级隐秘变量
      - name: Login to Docker Hub
        # 仅在非 Pull Request (比如你 Push 或者打 Tag 时) 登录并推送
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 这个 Action 会极其智能地根据你的分支或者 Tag 自动生成镜像的 Tag 标签
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/go-path-proxy
          # master 分支会自动编出 :latest ；如果你打了个 v1.0.0 的 tag 就会编出 :v1.0.0
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      # 真正执行 Build 和 Push 的最后一步
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 直接在此处指定跨越了两个最常用服务器平台的架构：常见的 x86 和 甲骨文极品 ARM 机器 
          platforms: linux/amd64,linux/arm64
          # 非 PR 构建才执行真实的 push 上传
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
